<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <title>葉來葉棒 AI 伴學自主學習 OS</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body style="--accent:#4f46e5;--accent2:#059669;--accent3:#eab308;--dark:#141827">
    <main class="shell">
      <aside class="rail">
        <section class="brand">
          <span class="brand-mark">葉</span>
          <div>
            <strong>葉來葉棒</strong>
            <small>時間軸、題庫、筆記與 AI 解題整合</small>
          </div>
        </section>
        <nav class="nav" id="nav"></nav>
        <section class="operator">
          <span>操作身分</span>
          <strong>全權限展示</strong>
          <small>免登入，公開版使用模擬資料與完整操作流程。</small>
        </section>
      </aside>
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">115509 專業化展示版</p>
            <h1 id="viewTitle"></h1>
          </div>
          <div id="statusLine" class="status-line"></div>
        </header>
        <section id="app"></section>
      </section>
    </main>
    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
  </body>
</html>
